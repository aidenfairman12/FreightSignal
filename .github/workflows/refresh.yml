name: Refresh Corpus

on:
  schedule:
    # Every 6 hours — matches RSS feed update cadence
    - cron: "0 */6 * * *"
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch new articles
        run: python pipeline/fetch_articles.py

      - name: Update vector store
        run: python pipeline/chunk_embed.py

      - name: Commit updated corpus (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/articles.jsonl data/processed/chroma_db/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            ARTICLE_COUNT=$(wc -l < data/raw/articles.jsonl | tr -d ' ')
            git commit -m "chore: refresh corpus (${ARTICLE_COUNT} articles)"
            git push
          fi
